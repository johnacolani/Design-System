name: design_system
description: "Design System Builder - Create and export design systems for Flutter, Kotlin, and Swift"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Routing
  go_router: ^13.0.0
  
  # Color Picker
  flutter_colorpicker: ^1.0.3
  
  # File handling
  path_provider: ^2.1.1
  file_picker: ^8.1.2
  shared_preferences: ^2.2.2
  
  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.3
  
  # JSON handling
  json_annotation: ^4.8.1
  
  # Date formatting
  intl: ^0.19.0
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.2.1
  firebase_storage: ^12.3.4
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1
  font_awesome_flutter: ^10.7.0
  
  # Typography
  google_fonts: ^6.2.1

  # Docs (markdown)
  flutter_markdown: ^0.7.4+1

  # Lottie animations (LottieFiles)
  lottie: ^3.3.0

  # Charts for UI Lab
  fl_chart: ^0.69.0

  # Zip for package generator
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^4.3.0
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

# Patrol integration tests (run with: patrol test --device chrome)
patrol:
  test_directory: integration_test

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - lib/data/color_palettes.json
    - assets/docs/
    - assets/images/
    - assets/images/android.png
    - assets/images/apple.png
    - assets/images/flutter.png
    - assets/images/react-native.png
    - assets/images/web-png.png
    - macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
